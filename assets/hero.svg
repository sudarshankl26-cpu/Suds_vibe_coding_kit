<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340" role="img" aria-label="Sud's Vibe Coding Kit">
  <defs>
    <style>
      .ink{fill:#1b2430} .muted{fill:#7b8494} .accent{fill:#3b5bdb}
      .h1{font:600 52px Inter,-apple-system,'Segoe UI',sans-serif}
      .eyebrow{font:600 15px Inter,-apple-system,'Segoe UI',sans-serif;letter-spacing:.18em}
      .sub{font:400 20px Inter,-apple-system,'Segoe UI',sans-serif}
      .chip{font:600 22px 'JetBrains Mono',ui-monospace,monospace;fill:#ffffff}
      .lbl{font:600 15px 'JetBrains Mono',ui-monospace,monospace;fill:#3a4150}
    </style>
  </defs>
  <rect x="1" y="1" width="1198" height="338" rx="22" fill="#FAFAFA" stroke="#e7e9ef" stroke-width="1.5"/>
  <!-- left: text -->
  <text x="64" y="92" class="eyebrow accent">AI&#160;&#160;CODING&#160;&#160;HARNESS</text>
  <text x="62" y="158" class="h1 ink">Sud&#8217;s Vibe Coding Kit</text>
  <rect x="64" y="184" width="78" height="34" rx="9" fill="#3b5bdb"/>
  <text x="103" y="208" class="chip" text-anchor="middle">v6.4</text>
  <text x="160" y="208" class="sub muted">plain files + two commands. No framework, no runtime deps.</text>
  <text x="64" y="258" class="sub ink">Files you drop into a project so AI agents stop drifting,</text>
  <text x="64" y="288" class="sub ink">dropping tasks, and re-reading your whole repo.</text>
  <!-- right: motif — three contracts feed a gate -->
  <g transform="translate(852,86)">
    <rect x="0" y="0"   width="150" height="44" rx="10" fill="#ffffff" stroke="#e7e9ef" stroke-width="1.5"/>
    <text x="16" y="28" class="lbl">PRD.md</text>
    <rect x="0" y="58"  width="150" height="44" rx="10" fill="#ffffff" stroke="#e7e9ef" stroke-width="1.5"/>
    <text x="16" y="86" class="lbl">AGENTS.md</text>
    <rect x="0" y="116" width="150" height="44" rx="10" fill="#ffffff" stroke="#e7e9ef" stroke-width="1.5"/>
    <text x="16" y="144" class="lbl">STATE.md</text>
    <!-- arrow -->
    <path d="M168 80 H232" fill="none" stroke="#c7ccd8" stroke-width="2"/>
    <path d="M226 73 L236 80 L226 87" fill="none" stroke="#c7ccd8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- gate circle with check -->
    <circle cx="286" cy="80" r="40" fill="#ffffff" stroke="#3b5bdb" stroke-width="1.5"/>
    <path d="M268 80 l12 12 l22 -26" fill="none" stroke="#3b5bdb" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="286" y="150" class="lbl" text-anchor="middle">just verify</text>
  </g>
</svg>
